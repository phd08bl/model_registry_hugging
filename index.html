.user{font-size:11px;line-height:1.25;margin-left:8px}.content{padding:22px 26px 40px;min-width:1100px}.page-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}.page-head h1{font-size:24px;margin:0 0 6px;letter-spacing:-.02em}.page-head p{margin:0;color:var(--muted);font-size:12px}.mvp-note{border:1px solid #efc47d;background:#fffaf1;padding:9px 12px;border-radius:7px;font-size:11px;white-space:nowrap}.workflow{display:grid;grid-template-columns:repeat(10,1fr);margin:22px 0 18px;position:relative}.workflow:before{content:"";position:absolute;left:4%;right:4%;top:14px;height:1px;background:#cdd8d4}.flow-step{position:relative;text-align:center;color:#52635d;font-size:10px;line-height:1.25;padding:0 4px;cursor:pointer}.flow-step b{width:28px;height:28px;border:1px solid #cbd7d3;background:white;border-radius:50%;display:grid;place-items:center;margin:0 auto 7px;position:relative;z-index:1}.flow-step.active{color:#075e3b;font-weight:700}.flow-step.active b{background:var(--green);border-color:var(--green);color:white;box-shadow:0 0 0 4px #e1f3e8}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g6{grid-template-columns:repeat(6,minmax(0,1fr))}.span2{grid-column:span 2}.span3{grid-column:span 3}.span4{grid-column:span 4}.card{background:white;border:1px solid var(--line);border-radius:var(--radius);padding:14px;min-width:0}.card h2,.card h3{margin:0 0 10px;font-size:13px}.card h2{font-size:14px}.subtle{color:var(--muted);font-size:11px;line-height:1.45}.kpi{display:flex;align-items:center;gap:12px;min-height:82px}.kpi-icon{width:42px;height:42px;border-radius:50%;background:var(--green-3);color:var(--green);display:grid;place-items:center;font-size:18px;font-weight:800}.kpi.warn .kpi-icon{background:var(--orange-soft);color:var(--orange)}.kpi.blue .kpi-icon{background:var(--blue-soft);color:var(--blue)}.kpi-value{font-size:24px;font-weight:800;letter-spacing:-.03em}.kpi-label{font-size:11px;color:#43544f}.delta{font-size:10px;color:var(--green);margin-top:3px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.toolbar-actions{display:flex;gap:8px}.btn{border:1px solid #cdd9d4;background:white;color:#173b31;border-radius:7px;padding:8px 13px;font-size:11px;font-weight:600;min-height:34px}.btn:hover{border-color:#76a795;background:#f4faf7}.btn.primary{background:var(--green);border-color:var(--green);color:white}.btn.primary:hover{background:#05653a}.btn.warn{border-color:#efb663;color:#c56400;background:#fffaf2}.btn.danger{border-color:#eba5a5;color:#b32626}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.table{width:100%;border-collapse:collapse;font-size:10.5px;white-space:nowrap}.table th{background:#f7f9f8;color:#596963;font-weight:600;text-align:left;padding:8px}.table td{border-top:1px solid #e8eeeb;padding:8px}.table tbody tr:hover{background:#f8fcfa}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 7px;background:#edf2f0;color:#45534f;font-size:9px;font-weight:700}.badge.green{background:#dff3e8;color:#08683f}.badge.orange{background:#fff0d9;color:#b65a00}.badge.red{background:#ffe6e6;color:#bc2929}.badge.blue{background:#e7efff;color:#285fc4}.dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:currentColor;margin-right:5px}.progress{height:7px;border-radius:10px;background:#e8eeeb;overflow:hidden}.progress i{display:block;height:100%;background:var(--green);border-radius:inherit}.list{display:grid;gap:9px}.list-row{display:flex;gap:9px;align-items:flex-start;font-size:11px;line-height:1.45}.check{width:17px;height:17px;flex:none;border-radius:50%;display:grid;place-items:center;background:var(--green-3);color:var(--green);font-weight:800;font-size:10px}.check.warn{background:var(--orange-soft);color:var(--orange)}.section-gap{margin-top:12px}.chart{height:150px;display:flex;align-items:flex-end;gap:12px;border-bottom:1px solid var(--line);padding:0 6px}.bar{flex:1;background:linear-gradient(180deg,#21a367,#087443);border-radius:5px 5px 0 0;min-width:22px;position:relative}.bar.orange{background:linear-gradient(180deg,#ffad44,#ec861b)}.bar.blue{background:linear-gradient(180deg,#5f8fea,#2768d9)}.bar span{position:absolute;top:-18px;width:100%;text-align:center;font-size:10px;font-weight:700}.chart-labels{display:flex;gap:12px;padding:7px 6px 0}.chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--muted)}.score-ring{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--green) 0 var(--score),#e8eeeb var(--score));position:relative}.score-ring:after{content:"";position:absolute;inset:9px;background:white;border-radius:50%}.score-ring b{position:relative;z-index:1;font-size:18px}.split{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:12px}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:10px;font-weight:700}.field input,.field select,.field textarea{border:1px solid #d3deda;border-radius:6px;padding:8px 9px;background:white;color:var(--ink);font-size:11px;outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:#4e9d7d;box-shadow:0 0 0 3px #e0f2e9}.field textarea{min-height:82px;resize:vertical}.upload{border:1px dashed #9fb7ae;border-radius:8px;display:grid;place-items:center;text-align:center;min-height:130px;background:#fbfdfc;color:#536760;font-size:11px}.route-card{border:1px solid #e9bb6e;background:#fff8ea;border-radius:8px;padding:14px}.risk-option{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #edf1ef;font-size:11px}.risk-option input{accent-color:var(--green)}.thread{border-left:2px solid #d6e4de;margin-left:8px;padding-left:16px;display:grid;gap:12px}.message{position:relative;font-size:11px;line-height:1.45}.message:before <div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="brand-mark"><i></i><i></i><i></i><i></i></span><div class="brand-copy"><strong>AI Risk Triaging Assistant</strong><small>AI Risk Oversight</small></div></div>
    <div class="nav-label">WORKFLOW</div><nav id="workflowNav"></nav>
    <div class="nav-label">MENU</div>
    <button class="nav-item active" data-utility="dashboard"><span class="nav-num">⌂</span><span>Dashboard</span></button>
    <button class="nav-item" data-utility="reports"><span class="nav-num">▤</span><span>Reports</span></button>
    <button class="nav-item" data-utility="settings"><span class="nav-num">⚙</span><span>Settings</span></button>

  </aside>
  <main class="workspace">
    <header class="topbar"><div class="case-select">Current Use Case <strong>UC-2025-0067</strong> · SharePilot</div><button class="team">AI Risk Oversight Team⌄</button><button class="icon-btn" aria-label="Notifications">◌</button><button class="icon-btn" aria-label="Help">?</button><span class="avatar">AT</span><span class="user"><strong>Anna T</strong><br>AIRO Lead</span></header>
    <div class="content" id="appContent"></div>
  </main>
</div>
<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-head"><div><h2>Create Triaging Project</h2><div class="subtle">Associate a use case to create a new triaging project.</div></div><button class="icon-btn" data-close>×</button></div><form id="projectForm"><div class="g2 grid"><div class="field"><label>Use Case ID</label><input value="UC-2025-0068" required></div><div class="field"><label>Project Name</label><input placeholder="e.g. Smart Contract Q&amp;A" required></div><div class="field"><label>Use Case Owner</label><input placeholder="Name" required></div><div class="field"><label>Business Area</label><select><option>Business Operations</option><option>Finance</option><option>People &amp; Culture</option><option>Marketing</option></select></div><div class="field"><label>AI Capability</label><select><option>Generative AI</option><option>Predictive Model</option><option>Computer Vision</option></select></div><div class="field"><label>Priority</label><select><option>Medium</option><option>High</option><option>Low</option></select></div></div><div class="field"><label>Initial Notes</label><textarea placeholder="Describe the business purpose, data scope, and expected go-live date"></textarea></div><div class="toolbar-actions" style="justify-content:flex-end"><button type="button" class="btn" data-close>Cancel</button><button class="btn primary">Create Project</button></div></form></div></div>
<div class="toast" id="toast"></div>
<script>
  const steps=["总览与项目创建","采集与摄入","完整性检查","跟进用例团队","风险映射","审查包","2LoD 输入","澄清管理","综合评估","证据与结果"];
  const desc=["查看分诊需求、活跃项目和关键待办，并创建新的分诊项目。","汇总多来源信息，检查摄入质量并形成原始采集包。","判断信息是否足以推进，只请求当前真正必要的材料。","通过既有渠道向用例团队发起问题并追踪回复。","将用例特征映射到企业风险领域并确定专家路由。","生成可在工具外共享的、面向 2LoD 的结构化审查包。","集中记录各风险团队的评估、条件、问题与升级事项。","代表专家向用例团队管理澄清请求并保存完整审计轨迹。","综合专家意见，形成最终风险结论与可编辑理由。","固化证据、批准记录、沟通结果与重新介入触发条件。"];
  let current=0; const state={created:0,ingested:5,completeness:68,routingApproved:false,packGenerated:true,clarificationResolved:false,assessmentApproved:false,useCaseTeamStage:"Intake Submitted",airoWorkflowStage:"Intake",stageLastUpdatedAt:new Date().toISOString(),stageUpdatedBy:"Anna T",stageNotes:"",stageManualOverride:false};
  const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
  function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
  function badge(text,color="green"){return `<span class="badge ${color}">${text}</span>`}
  function kpi(label,value,meta="",tone=""){return `<div class="card kpi ${tone}"><span class="kpi-icon">${tone==="warn"?"!":tone==="blue"?"i":"✓"}</span><div><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div><div class="delta">${meta}</div></div></div>`}
  function table(headers,rows){return `<div class="table-wrap"><table class="table"><thead><tr>${headers.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(x=>`<td>${x}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`}
  function list(items,warn=false){return `<div class="list">${items.map(x=>`<div class="list-row"><span class="check ${warn?"warn":""}">${warn?"!":"✓"}</span><span>${x}</span></div>`).join("")}</div>`}
  function workflow(){return `<div class="workflow">${steps.map((s,i)=>`<div class="flow-step ${i===current?"active":""}" data-page="${i}"><b>${i+1}</b>${s}</div>`).join("")}</div>`}
  function shell(body){return `<div class="page"><div class="page-head"><div><h1>${current+1}. ${steps[current]}</h1><p>${desc[current]}</p></div><div class="mvp-note">ⓘ AIRO 主导的 MVP：用例团队与 2LoD 团队无需直接访问本工具</div></div>${workflow()}${body}</div>`}
  const USE_CASE_TEAM_STAGES=["Intake Submitted","AIRO Reviewing Intake","More Information Required","Clarification Provided","Under 2LoD Specialist Review","Assessment & Outcome","Outcome Issued","Re-engagement / Change Notification"];
  const AIRO_WORKFLOW_STAGES=["Intake","Completeness","Follow-up","Risk Mapping","Review Pack","2LoD Inputs","Clarification","Assessment","Evidence"];
  const PAGE_STAGE_DEFAULTS=[["Intake Submitted","Intake"],["AIRO Reviewing Intake","Intake"],["AIRO Reviewing Intake","Completeness"],["More Information Required","Follow-up"],["Clarification Provided","Risk Mapping"],["Under 2LoD Specialist Review","Review Pack"],["Under 2LoD Specialist Review","2LoD Inputs"],["More Information Required","Clarification"],["Assessment & Outcome","Assessment"],["Outcome Issued","Evidence"]];
  function syncStageForPage(){if(state.lastStagePage===current)return;const mapped=[...PAGE_STAGE_DEFAULTS[current]];if(current===7&&state.clarificationResolved)mapped[0]="Clarification Provided";if(current===9&&state.reengagementRequired)mapped[0]="Re-engagement / Change Notification";[state.useCaseTeamStage,state.airoWorkflowStage]=mapped;state.stageLastUpdatedAt=new Date().toISOString();state.stageUpdatedBy="Anna T";state.lastStagePage=current;state.stageManualOverride=false}
  function progressRow(items,currentValue,type){const active=Math.max(0,items.indexOf(currentValue));return `<div class="stage-steps ${type}">${items.map((label,index)=>`<div class="stage-step ${index<active?"done":index===active?"current":"future"}" aria-current="${index===active?"step":"false"}"><i>${index<active?"✓":index+1}</i><span class="stage-label">${label}</span></div>`).join("")}</div>`}
  function UseCaseJourneySwimlane(){return `<section class="stage-tracker" aria-label="Project stage tracker"><div class="stage-row"><div class="stage-title"><strong>Use Case Team Journey</strong><span>Model Owner journey · no direct tool access</span></div>${progressRow(USE_CASE_TEAM_STAGES,state.useCaseTeamStage,"use-case")}<div class="stage-actions"><span class="stage-meta">Updated by ${state.stageUpdatedBy}</span><button class="btn" type="button" data-stage-edit aria-expanded="false">Update stages</button></div></div>${current>0?`<div class="stage-row"><div class="stage-title"><strong>AIRO Workflow</strong><span>Internal oversight workflow</span></div>${progressRow(AIRO_WORKFLOW_STAGES,state.airoWorkflowStage,"airo")}<span class="stage-meta">${new Date(state.stageLastUpdatedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}</span></div>`:""}<form class="stage-editor" id="stageEditor"><label>Use Case Team Stage<select name="useCaseTeamStage">${USE_CASE_TEAM_STAGES.map(stage=>`<option ${stage===state.useCaseTeamStage?"selected":""}>${stage}</option>`).join("")}</select></label><label>AIRO Workflow Stage<select name="airoWorkflowStage">${AIRO_WORKFLOW_STAGES.map(stage=>`<option ${stage===state.airoWorkflowStage?"selected":""}>${stage}</option>`).join("")}</select></label><label>Stage notes <span class="subtle">(optional)</span><input name="stageNotes" value="${esc(state.stageNotes||"")}" placeholder="Add a short audit note"></label><div class="stage-actions" style="align-self:end"><button class="btn" type="button" data-stage-cancel>Cancel</button><button class="btn primary" type="submit">Save</button></div></form></section>`}
  function AiroWorkflowProgress(){return current>0?progressRow(AIRO_WORKFLOW_STAGES,state.airoWorkflowStage,"airo"):""}

  function localizeEnglish(root=document.body){
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
    const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node=>{if(/[\u3400-\u9fff]/.test(node.nodeValue)) node.nodeValue=translateEnglish(node.nodeValue)});
    root.querySelectorAll?.('[placeholder],[aria-label],[data-toast],[data-download]').forEach(el=>{
      ['placeholder','aria-label','data-toast','data-download'].forEach(name=>{if(el.hasAttribute(name)) el.setAttribute(name,translateEnglish(el.getAttribute(name)))});
    });
  }
  function enhanceTwoLodInputPanel(){
    if(current!==6)return;
    const panel=document.querySelector('body > div:nth-of-type(1) > main:nth-of-type(1) > div:nth-of-type(1) > div:nth-of-type(1) > div:nth-of-type(4)');
    if(!panel)return;
    panel.style.display='flex';
    panel.style.alignItems='center';
    panel.style.justifyContent='space-between';
    panel.style.gap='16px';
    panel.style.flexWrap='wrap';
    panel.innerHTML=`<div><strong style="display:block;margin-bottom:3px">2LoD input files</strong><span class="subtle">Upload PDF, DOCX, MSG or Email files, or sync from the AI Risk Triage Confluence page</span></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><input id="twoLodFileInput" type="file" accept=".pdf,.doc,.docx,.msg,.eml,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,message/rfc822" multiple hidden><button type="button" class="btn" id="uploadTwoLodFiles">Upload 2LoD files</button><span id="twoLodUploadStatus" class="subtle" aria-live="polite">${state.twoLodFiles||'No files selected'}</span><span style="display:flex;align-items:center;gap:6px"><input id="twoLodConfluenceUrl" type="url" aria-label="Confluence page link" placeholder="Paste Confluence page link" value="${state.twoLodConfluenceUrl||''}" style="width:210px;height:34px;padding:7px 10px;border:1px solid #b9c5bf;border-radius:7px;background:#fff;color:#17352a;font:11px 'Segoe UI','Microsoft YaHei',system-ui,sans-serif;outline:none"><button type="button" class="btn primary" id="syncTwoLodFiles">Sync from Confluence page</button></span></div>`;
    const input=panel.querySelector('#twoLodFileInput');
    panel.querySelector('#uploadTwoLodFiles').onclick=()=>input.click();
    input.onchange=()=>{
      const count=input.files.length;
      state.twoLodFileCount=count;
      state.twoLodFiles=count?`${count} file${count===1?'':'s'} ready`:'No files selected';
      panel.querySelector('#twoLodUploadStatus').textContent=state.twoLodFiles;
      if(count)toast(`${count} 2LoD input file${count===1?'':'s'} uploaded`);
    };
    panel.querySelector('#syncTwoLodFiles').onclick=()=>{
      const url=panel.querySelector('#twoLodConfluenceUrl').value.trim();
      try{
        const parsed=new URL(url);
        if(!['http:','https:'].includes(parsed.protocol))throw new Error('Unsupported protocol');
        state.twoLodConfluenceUrl=url;
        toast('Inputs synced from the AI Risk Triage Confluence page');
      }catch(error){
        toast('Enter a valid Confluence page link');
        panel.querySelector('#twoLodConfluenceUrl').focus();
      }
    };
  }
  const baseProjectSubmit=$("#projectForm").onsubmit;
  $("#projectForm").onsubmit=function(event){state.useCaseTeamStage="Intake Submitted";state.airoWorkflowStage="Intake";state.stageLastUpdatedAt=new Date().toISOString();state.stageUpdatedBy="Anna T";state.stageNotes="Project created";state.lastStagePage=0;baseProjectSubmit(event)};
  const baseRender=render;
  render=function(){baseRender();enhanceTwoLodInputPanel();localizeEnglish(document.body);renderStageTracker();enhanceDashboardStages()};
  new MutationObserver(records=>records.forEach(record=>record.addedNodes.forEach(node=>{
    if(node.nodeType===Node.TEXT_NODE){if(/[\u3400-\u9fff]/.test(node.nodeValue))node.nodeValue=translateEnglish(node.nodeValue)}
    else if(node.nodeType===Node.ELEMENT_NODE)localizeEnglish(node);
  }))).observe(document.body,{childList:true,subtree:true});
  render();
